<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}RTH CommsDesk{% endblock %}</title>
    <link rel="stylesheet" href="/static/ui.css" />
    {% block styles %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="wide-wrap topbar-inner">
        <div>
          <h1 class="brand">RTH CommsDesk</h1>
          <nav class="nav-links" aria-label="Main navigation">
            <a href="/">Dashboard</a>
            <a href="/contacts">Contacts</a>
            <a href="/drafts">Drafts</a>
            <a href="/review-packages">Review</a>
            <a href="/assistant-profile">Assistant</a>
            <a href="/voice-calibration">Voice</a>
            <a href="/bulk-triage">Bulk Triage</a>
            <a href="/executions">Executions</a>
            <a href="/providers">Providers</a>
            <a href="/operational-smoke">Smoke</a>
            <a href="/admin">Admin</a>
          </nav>
        </div>
        <div class="sync-actions">
          <form method="post" action="/sync/gmail"><button class="primary" type="submit">Sync Gmail</button></form>
          <form method="post" action="/sync/gmail">
            <input type="hidden" name="resync" value="true" />
            <button type="submit">Resync recent</button>
          </form>
          <form method="post" action="/sync/gmail/backfill"><button type="submit">Backfill older</button></form>
          <form method="post" action="/sync/outlook"><button type="submit">Sync Outlook</button></form>
          <form method="post" action="/logout"><button type="submit">Sign out</button></form>
        </div>
      </div>
    </header>

    <main class="{% block main_class %}wide-wrap page-pad{% endblock %}">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
