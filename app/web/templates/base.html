<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}RTH CommsDesk{% endblock %}</title>
    <link rel="stylesheet" href="/static/ui.css" />
    {% block styles %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="wide-wrap topbar-inner">
        <div>
          <h1 class="brand">RTH CommsDesk</h1>
          {% set current_path = request.url.path if request is defined else "/" %}
          <nav class="nav-links" aria-label="Main navigation">
            <a class="{% if current_path == '/' %}active{% endif %}" href="/">Dashboard</a>
            <a class="{% if current_path.startswith('/contacts') %}active{% endif %}" href="/contacts">Contacts</a>
            <a class="{% if current_path.startswith('/drafts') %}active{% endif %}" href="/drafts">Drafts</a>
            <a class="{% if current_path.startswith('/review-packages') %}active{% endif %}" href="/review-packages">Review</a>
            <a class="{% if current_path.startswith('/assistant-profile') %}active{% endif %}" href="/assistant-profile">Assistant</a>
            <a class="{% if current_path.startswith('/voice-calibration') %}active{% endif %}" href="/voice-calibration">Voice</a>
            <a class="{% if current_path.startswith('/bulk-triage') %}active{% endif %}" href="/bulk-triage">Bulk Triage</a>
            <a class="{% if current_path.startswith('/executions') %}active{% endif %}" href="/executions">Executions</a>
            <a class="{% if current_path.startswith('/providers') %}active{% endif %}" href="/providers">Providers</a>
            <a class="{% if current_path.startswith('/operational-smoke') %}active{% endif %}" href="/operational-smoke">Smoke</a>
            <a class="{% if current_path.startswith('/admin') %}active{% endif %}" href="/admin">Admin</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="{% block main_class %}wide-wrap page-pad{% endblock %}">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
