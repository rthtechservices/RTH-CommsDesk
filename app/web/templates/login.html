<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in | RTH CommsDesk</title>
  <link rel="stylesheet" href="/static/ui.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    .login-card h1 { font-size: 1.2rem; margin: 0 0 8px; color: var(--brand); letter-spacing: .04em; }
    .login-card p { font-size: 13px; color: var(--muted); margin: 0 0 24px; }
    .login-card label { display: grid; gap: 4px; margin-bottom: 14px; font-size: 13px; color: var(--muted); }
    .login-card button { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>RTH CommsDesk</h1>
    <p>Sign in to continue</p>
    {% if error %}
    <p class="warning">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required />
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button class="primary" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
